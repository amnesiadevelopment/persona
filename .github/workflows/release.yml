name: release

# Build the persona desktop app with `flet build` (Flutter-based, bundles the
# Flet client + Python runtime deterministically) for Linux, Windows, and
# macOS, and publish a per-OS artifact to a GitHub Release on each version tag:
# an AppImage (Linux), a portable zip (Windows .exe), and a dmg (macOS .app).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # flet 0.85.3 pins this exact Flutter version; using "stable" makes
          # flet try to reinstall the right one interactively and the build
          # hangs/fails on the [y/n] prompt in CI.
          flutter-version: "3.41.7"

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binutils clang cmake llvm lld ninja-build pkg-config \
            libgtk-3-dev libsecret-1-dev libunwind-dev \
            libasound2-dev

      - name: Install Flet CLI + app deps
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.85.3
          pip install --prefer-binary -r requirements.txt

      - name: Fetch bundled fonts into src/assets
        run: |
          chmod +x download-fonts.sh
          ./download-fonts.sh
          count=$(find src/assets/fonts -name '*.ttf' -o -name '*.ttc' | wc -l)
          echo "bundled font faces: $count"
          if [ "$count" -lt 8 ]; then
            echo "ERROR: too few fonts bundled ($count); aborting." >&2
            exit 1
          fi

      - name: Build the Linux bundle
        run: flet build linux -v --no-rich-output

      - name: Show what flet produced
        run: |
          echo "=== build/linux tree ==="
          find build/linux -maxdepth 2 -type f | head -40
          du -sh build/linux

      - name: Package the bundle into an AppImage
        run: |
          curl -fsSL -o /tmp/appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool
          APPDIR=/tmp/persona.AppDir
          rm -rf "$APPDIR"; mkdir -p "$APPDIR/usr"
          # flet build output lives in build/linux (executable + lib/ + data/)
          cp -r build/linux/* "$APPDIR/usr/"
          # find the actual executable flet produced
          BIN="$(find "$APPDIR/usr" -maxdepth 2 -type f -executable ! -name '*.so' | head -1)"
          echo "app executable: $BIN"
          BINREL="${BIN#$APPDIR/}"
          cp src/assets/icon.png "$APPDIR/persona.png"
          cat > "$APPDIR/persona.desktop" <<EOF
          [Desktop Entry]
          Type=Application
          Name=persona
          Comment=Anti-detect browser manager
          Exec=AppRun
          Icon=persona
          Categories=Network;WebBrowser;
          Terminal=false
          EOF
          cat > "$APPDIR/AppRun" <<EOF
          #!/bin/sh
          HERE="\$(dirname "\$(readlink -f "\$0")")"
          exec "\$HERE/$BINREL" "\$@"
          EOF
          chmod +x "$APPDIR/AppRun"
          ARCH=x86_64 /tmp/appimagetool --appimage-extract-and-run "$APPDIR" persona-x86_64.AppImage
          ls -la persona-x86_64.AppImage

      - name: Sanity-check the AppImage size
        run: |
          size=$(stat -c%s persona-x86_64.AppImage)
          echo "AppImage size: $size bytes"
          if [ "$size" -lt 30000000 ]; then
            echo "ERROR: AppImage too small ($size) - build likely incomplete." >&2
            exit 1
          fi

      - name: Upload the AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: persona-appimage
          path: persona-x86_64.AppImage
          if-no-files-found: error

      - name: Publish to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: persona-x86_64.AppImage
          generate_release_notes: true

  build-windows:
    runs-on: windows-latest
    # flet's build spinner prints box-drawing/dot glyphs; the Windows runner's
    # default cp1252 console can't encode them and flet dies with
    # UnicodeEncodeError. Force UTF-8 I/O for the whole job.
    env:
      PYTHONIOENCODING: "utf-8"
      PYTHONUTF8: "1"
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"

      - name: Install Flet CLI + app deps
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.85.3
          pip install --prefer-binary -r requirements.txt

      - name: Build the Windows bundle
        run: flet build windows -v --no-rich-output

      - name: Show what flet produced
        shell: bash
        run: |
          echo "=== build/windows tree ==="
          find build/windows -maxdepth 2 | head -60
          echo "=== every persona.exe + size ==="
          find build/windows -name persona.exe -exec ls -l {} \;

      - name: Build a Windows installer (Inno Setup)
        shell: pwsh
        run: |
          # flet build output (persona.exe + DLLs + data/) lives in build/windows.
          # Find the real exe so the installer launches the right binary.
          $exe = Get-ChildItem build/windows -Recurse -Filter *.exe |
            Where-Object { $_.Name -notmatch 'unins|vc_redist|setup' } |
            Select-Object -First 1
          if (-not $exe) { Write-Error "no .exe in build/windows"; exit 1 }
          $exeName = $exe.Name
          Write-Host "app exe: $exeName at $($exe.FullName)"
          pip install --quiet pillow
          # flet 0.85 leaves the default Flutter arrow icon in the compiled
          # runner even though flutter_launcher_icons reports success. Stamp the
          # real icon into the EXACT exe the installer packages, right before
          # ISCC, so nothing can overwrite it in between.
          $before = (Get-Item $exe.FullName).Length
          python .github/scripts/set_exe_icon.py $exe.FullName src/assets/icon.png
          if ($LASTEXITCODE -ne 0) { Write-Error "icon stamp failed"; exit 1 }
          $after = (Get-Item $exe.FullName).Length
          Write-Host "stamped $($exe.FullName): $before -> $after bytes"
          if ($after -le $before) { Write-Error "icon stamp did not grow the exe"; exit 1 }
          # Always derive the installer icon from the source PNG so the setup
          # gets persona's icon, not Inno Setup's default. A multi-size .ico
          # keeps it crisp at every shell size.
          $icoPath = Join-Path (Get-Location) "persona-installer.ico"
          python -c "from PIL import Image; Image.open('src/assets/icon.png').save(r'$icoPath', sizes=[(16,16),(24,24),(32,32),(48,48),(64,64),(128,128),(256,256)])"
          $iconLine = if (Test-Path $icoPath) { "SetupIconFile=$icoPath" } else { "" }
          Write-Host "installer icon: $iconLine"
          # Brand the wizard: a dark welcome banner (left panel) and a small
          # header logo, both generated from the app icon so the installer looks
          # like persona, not a stock Inno setup. Inno wants BMPs; sizes are the
          # modern-style wizard's expected 164x314 and 55x58 (at 100% DPI — Inno
          # scales them for HiDPI).
          $wizLarge = Join-Path (Get-Location) "wizard-large.bmp"
          $wizSmall = Join-Path (Get-Location) "wizard-small.bmp"
          python .github/scripts/make_wizard_images.py src/assets/icon.png $wizLarge $wizSmall
          $wizLines = ""
          if ((Test-Path $wizLarge) -and (Test-Path $wizSmall)) {
            $wizLines = "WizardImageFile=$wizLarge`nWizardSmallImageFile=$wizSmall`nWizardImageStretch=no"
          }
          Write-Host "wizard images: $wizLines"
          # Version string: on a tag it's the tag name; on a manual dispatch
          # github.ref_name is a branch, so fall back to the app's own version.
          $ver = "${{ github.ref_name }}"
          if ($ver -notmatch '^v?\d+\.\d+') {
            $ver = (Select-String -Path src/services/app_update/updater.py -Pattern 'APP_VERSION\s*=\s*"([^"]+)"').Matches[0].Groups[1].Value
          }
          Write-Host "installer version: $ver"
          $iss = @"
          [Setup]
          ; A FIXED AppId makes every new installer recognise a prior persona
          ; install and upgrade it IN PLACE (old files removed, one entry in
          ; Programs and Features) instead of leaving a second copy. User data
          ; lives in %USERPROFILE%\.persona and is never touched by (un)install.
          AppId={{6F2A9C1E-3B7D-4E52-9A44-A1B2C3D4E5F6}}
          AppName=persona
          AppVersion=$ver
          AppPublisher=persona contributors
          DefaultDirName={autopf}\persona
          DefaultGroupName=persona
          DisableProgramGroupPage=yes
          OutputDir=.
          OutputBaseFilename=persona-setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64compatible
          ArchitecturesAllowed=x64compatible
          WizardStyle=modern
          $iconLine
          $wizLines
          [InstallDelete]
          ; Clear the previous app payload before copying the new one so a file
          ; dropped between versions doesn't linger. Only touches {app} (Program
          ; Files\persona), NOT the user's .persona data.
          Type: filesandordirs; Name: "{app}\*"
          [Files]
          Source: "build\windows\*"; DestDir: "{app}"; Flags: recursesubdirs createallsubdirs
          [Icons]
          Name: "{group}\persona"; Filename: "{app}\$exeName"
          Name: "{autodesktop}\persona"; Filename: "{app}\$exeName"; Tasks: desktopicon
          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"
          Name: "wipedata"; Description: "Delete my profiles, settings and logs"; GroupDescription: "Reset persona (leave both unchecked to keep everything):"; Flags: unchecked
          Name: "wipeengines"; Description: "Delete the downloaded browser engines (re-downloaded on next launch)"; GroupDescription: "Reset persona (leave both unchecked to keep everything):"; Flags: unchecked
          [Run]
          ; Refresh the shell icon cache so the new persona icon shows at every
          ; size immediately (Windows otherwise keeps the old cached icon).
          Filename: "{sys}\ie4uinit.exe"; Parameters: "-show"; Flags: runhidden nowait
          Filename: "{app}\$exeName"; Description: "Launch persona"; Flags: nowait postinstall skipifsilent
          [Code]
          // persona keeps two kinds of state, wiped by two independent tasks so a
          // user can reset settings without re-downloading ~750MB of engines, or
          // vice versa. Checking both leaves nothing behind — a from-scratch install.
          //
          //   data    = %USERPROFILE%\.persona  EXCEPT its \engine subdir
          //             (profiles, settings.json, logs, bookmarks) + the app's
          //             unpacked code caches in %APPDATA%\persona, %LOCALAPPDATA%\persona.
          //   engines = the fp-chromium binary in %USERPROFILE%\.persona\engine AND
          //             the stealth-Firefox cache in %LOCALAPPDATA%\invisible-playwright
          //             (invisible_playwright caches its engine OUTSIDE .persona).
          procedure WipePersonaDataKeepEngines;
          var
            root: String;
            findRec: TFindRec;
            entry: String;
          begin
            root := ExpandConstant('{%USERPROFILE}\.persona');
            if DirExists(root) then
            begin
              if FindFirst(root + '\*', findRec) then
              try
                repeat
                  entry := findRec.Name;
                  if (entry <> '.') and (entry <> '..') and (entry <> 'engine') then
                  begin
                    if (findRec.Attributes and FILE_ATTRIBUTE_DIRECTORY) <> 0 then
                      DelTree(root + '\' + entry, True, True, True)
                    else
                      DeleteFile(root + '\' + entry);
                  end;
                until not FindNext(findRec);
              finally
                FindClose(findRec);
              end;
            end;
            // The unpacked-code caches are always safe to drop; they rebuild.
            DelTree(ExpandConstant('{userappdata}\persona'), True, True, True);
            DelTree(ExpandConstant('{localappdata}\persona'), True, True, True);
          end;

          procedure WipePersonaEngines;
          begin
            DelTree(ExpandConstant('{%USERPROFILE}\.persona\engine'), True, True, True);
            DelTree(ExpandConstant('{localappdata}\invisible-playwright'), True, True, True);
          end;

          procedure CurStepChanged(CurStep: TSetupStep);
          begin
            if CurStep = ssInstall then
            begin
              if WizardIsTaskSelected('wipedata') then
                WipePersonaDataKeepEngines;
              if WizardIsTaskSelected('wipeengines') then
                WipePersonaEngines;
            end;
          end;
          "@
          Set-Content -Path persona.iss -Value $iss -Encoding UTF8
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          & $iscc persona.iss
          if ($LASTEXITCODE -ne 0) { Write-Error "ISCC failed"; exit 1 }
          Rename-Item persona-setup.exe persona-windows-setup.exe
          Get-Item persona-windows-setup.exe | Format-List Name,Length

      - name: Sanity-check the installer size
        shell: bash
        run: |
          size=$(stat -c%s persona-windows-setup.exe)
          echo "installer size: $size bytes"
          if [ "$size" -lt 15000000 ]; then
            echo "ERROR: installer too small ($size) - build likely incomplete." >&2
            exit 1
          fi

      - name: Upload the Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: persona-windows
          path: persona-windows-setup.exe
          if-no-files-found: error

      - name: Publish to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: persona-windows-setup.exe
          generate_release_notes: true

  build-macos:
    runs-on: macos-latest
    # flet build macos rebuilds the Python deps with its own pip, which tried to
    # compile the cryptography Rust wheel from source and failed. Force pip (both
    # ours and flet's internal one) to take cryptography's prebuilt macOS wheel.
    env:
      PIP_ONLY_BINARY: cryptography
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"

      - name: Install Flet CLI + app deps
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.85.3
          pip install --prefer-binary -r requirements.txt

      - name: Build the macOS bundle
        run: flet build macos -v --no-rich-output

      - name: Package the .app into a dmg
        run: |
          echo "=== build/macos tree ==="
          find build/macos -maxdepth 3 -name "*.app" | head
          APP="$(find build/macos -maxdepth 3 -name '*.app' | head -1)"
          if [ -z "$APP" ]; then
            echo "ERROR: no .app produced by flet build macos" >&2
            exit 1
          fi
          echo "app bundle: $APP"
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname persona -srcfolder "$STAGE" -ov \
            -format UDZO persona-macos.dmg
          ls -la persona-macos.dmg

      - name: Sanity-check the dmg size
        run: |
          size=$(stat -f%z persona-macos.dmg)
          echo "dmg size: $size bytes"
          if [ "$size" -lt 15000000 ]; then
            echo "ERROR: dmg too small ($size) - build likely incomplete." >&2
            exit 1
          fi

      - name: Upload the macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: persona-macos
          path: persona-macos.dmg
          if-no-files-found: error

      - name: Publish to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: persona-macos.dmg
          generate_release_notes: true
